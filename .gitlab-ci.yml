# Documentation for the format of this file can be found at https://docs.gitlab.com/ce/ci/yaml/README.html

image:
  name: yyz-gitlab.local.tenstorrent.com:5005/tenstorrent/infra/devel-whisper
  entrypoint: [""]

# Global variables
variables:
  # Package version can only contain numbers (0-9), and dots (.).
  # Must be in the format of X.Y.Z, i.e. should match /\A\d+\.\d+\.\d+\z/ regular expresion.
  # See https://docs.gitlab.com/ee/user/packages/generic_packages/#publish-a-package-file
  PACKAGE_VERSION: ${CI_COMMIT_TAG}
  UBUNTU_BINARY: "whisper-ubuntu-${PACKAGE_VERSION}"
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/swerv-iss/${PACKAGE_VERSION}"
  GIT_DEPTH: 1 # Shallow clone to only one depth for speed up
  GIT_SUBMODULE_STRATEGY: recursive # See https://docs.gitlab.com/ce/ci/git_submodules.html
  SILENT: 0 # Causes make to print all commands it executes

# Commonly used YAML (anchors)
.define-anchors:
  # refs:
  - &BRANCH_IS_MASTER /^master$/
  - &BRANCH_IS_BLACKHOLE /^black-hole.*$/

stages:
  - test # Nothing too serious; one stage is all we need right now
  - build-release # stages for our release pipeline
  - upload-release
  - release

post-commit-test:
  stage: test
  allow_failure: false
  script:
    - make -j32
    - cd testing && source init_venv.sh && ralph trace -t configs.py --clean
  artifacts: &TEST_ARTIFACTS
    when: always
    expire_in: 8 hours
    paths:
      - "test_output/*/*"

build-release:
  stage: build-release
  image:
    name: yyz-gitlab.local.tenstorrent.com:5005/tenstorrent/infra/devel-whisper
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - make -j32
    - mv build-Linux/whisper build-Linux/${UBUNTU_BINARY}
  artifacts:
    paths:
      - build-Linux/

upload-release:
  stage: upload-release
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build-Linux/${UBUNTU_BINARY} "${PACKAGE_REGISTRY_URL}/${UBUNTU_BINARY}"

release:
  # Caution, as of 2021-02-02 these assets links require a login, see:
  # https://gitlab.com/gitlab-org/gitlab/-/issues/299384
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      release-cli create --name "Release $CI_COMMIT_TAG" --tag-name $CI_COMMIT_TAG \
        --assets-link "{\"name\":\"${UBUNTU_BINARY}\",\"url\":\"${PACKAGE_REGISTRY_URL}/${UBUNTU_BINARY}\"}"
